name: Publish Slides

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mbd-rwth/juliacon2026_keynote:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Render slides
        run: quarto render

      - uses: actions/upload-artifact@v4
        with:
          name: slides
          path: _site/

  deploy:
    needs: render
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: slides
          path: _site/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site/
